<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘电影</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
        }
        /* 顶部导航栏 */
        .header {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        /* 标签栏 */
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            margin-bottom: 15px;
        }
        .tabs a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            padding: 5px 0;
        }
        .tabs a.active {
            color: #00cc00;
            border-bottom: 2px solid #00cc00;
        }
        /* 搜索框 */
        .search-box {
            display: flex;
            margin: 0 15px 15px;
        }
        .search-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 3px 0 0 3px;
            font-size: 14px;
        }
        .search-btn {
            background-color: #00cc00;
            color: #fff;
            border: none;
            padding: 0 15px;
            border-radius: 0 3px 3px 0;
            cursor: pointer;
        }
        /* 提示语 */
        .tips {
            background-color: #fff9e6;
            padding: 10px 15px;
            color: #ff3333;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }
        /* 内容列表 */
        .content-list {
            padding: 0 15px;
        }
        .content-item {
            margin-bottom: 15px;
        }
        .content-item img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .content-item p {
            font-size: 14px;
            color: #666;
        }
        /* 广告栏 */
        .ad-banner {
            width: 100%;
            margin: 5px
        }
        .ad-banner img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">神秘电影</div>
        <div class="tabs">
            <a href="#" class="active">精选</a>
            <a href="guochan.html">国产</a>
            <a href="#">日本</a>
            <a href="#">韩国</a>
            <a href="#">欧美</a>
            <a href="#">三级</a>
            <a href="#">动漫</a>
        </div>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" placeholder="请输入关键词 例如: 户外">
        <button class="search-btn">🔍</button>
    </div>

    <div class="tips">热爱生活、分享快乐、欢迎大家天天免费看新片</div>

    <div class="content-list">
        <div class="content-item">
            <img src="2.jpg" alt="影片封面">
            <p>胡迪尼之怪</p>
        </div>
        <div class="content-item">
            <img src="./1.png" alt="影片封面">
            <p>胡迪尼之迷</p>
        </div>
        <div class="content-item">
            <img src="xr.png" alt="影片封面">
            <p>胡迪迷之屌</p>
        </div>
    </div>

    <div class="ad-banner">
        <img src="./wuyu.png" alt="广告横幅">
    </div>
</body>
</html>
