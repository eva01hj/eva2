<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘电影 - 国产</title>
    <style>
        /* 复用主页面的CSS样式，此处省略（可直接复制主页面的style部分） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
        }
        .header {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            margin-bottom: 15px;
        }
        .tabs a {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            padding: 5px 0;
        }
        .tabs a.active {
            color: #00cc00;
            border-bottom: 2px solid #00cc00;
        }
        .search-box {
            display: flex;
            margin: 0 15px 15px;
        }
        .search-input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 3px 0 0 3px;
            font-size: 14px;
        }
        .search-btn {
            background-color: #00cc00;
            color: #fff;
            border: none;
            padding: 0 15px;
            border-radius: 0 3px 3px 0;
            cursor: pointer;
        }
        .tips {
            background-color: #fff9e6;
            padding: 10px 15px;
            color: #ff3333;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .content-list {
            padding: 0 15px;
        }
        .content-item {
            margin-bottom: 15px;
        }
        .content-item img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .content-item p {
            font-size: 14px;
            color: #666;
        }
        .ad-banner {
            width: 100%;
            margin: 10px 0;
        }
        .ad-banner img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">神秘电影</div>
        <div class="tabs">
            <a href="index.html">精选</a>
            <a href="#" class="active">国产</a>
            <a href="japan.html">日本</a>
            <a href="korea.html">韩国</a>
            <a href="europe.html">欧美</a>
            <a href="three.html">三级</a>
            <a href="anime.html">动漫</a>
        </div>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" placeholder="请输入关键词 例如: 户外">
        <button class="search-btn">🔍</button>
    </div>

    <div class="tips">热爱生活、分享快乐、欢迎大家天天免费看新片</div>

    <div class="content-list">
        <div class="content-item">
            <img src="chong.jpg" alt="国产影片封面">
            <p>国产经典影片1</p>
        </div>
        <div class="content-item">
            <img src="wo.jpg" alt="国产影片封面">
            <p>国产热门新作2</p>
        </div>
        <div class="content-item">
            <img src="di2.jpg" alt="国产影片封面">
            <p>国产高分佳作3</p>
        </div>
    </div>

    <div class="ad-banner">
        <img src="pi.jpg" alt="广告横幅">
    </div>
</body>
</html>
